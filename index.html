<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXCELSIOR UAS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;height:100%;
  background:#07090f;
  font-family:'Courier New',Courier,monospace;
  color:#a0bce0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;
}

/* Subtle grid bg */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,180,255,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,180,255,0.04) 1px,transparent 1px);
  background-size:48px 48px;
  pointer-events:none;
}

.logo{
  text-align:center;
  margin-bottom:56px;
}
.logo h1{
  font-size:clamp(1.6rem,5vw,2.8rem);
  color:#00ffff;
  text-shadow:0 0 24px #00ffff88,0 0 60px #00aaff44;
  letter-spacing:6px;
  font-weight:normal;
}
.logo p{
  font-size:0.72rem;
  color:#334455;
  letter-spacing:4px;
  margin-top:6px;
}

.cards{
  display:flex;
  gap:28px;
  flex-wrap:wrap;
  justify-content:center;
  padding:0 24px;
}

.card{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:16px;
  width:220px;
  height:240px;
  background:#090d18;
  border:1px solid #1a3050;
  border-radius:12px;
  text-decoration:none;
  color:#a0bce0;
  cursor:pointer;
  transition:all 0.2s ease;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(circle at 50% 0%, rgba(0,200,255,0.06) 0%, transparent 70%);
  opacity:0;
  transition:opacity 0.3s;
}

.card:hover{
  border-color:#00aaff;
  transform:translateY(-4px);
  box-shadow:0 0 32px #00aaff22, 0 12px 40px #00000066;
}
.card:hover::before{opacity:1;}

.card.kr-card:hover{
  border-color:#00ff88;
  box-shadow:0 0 32px #00ff8822, 0 12px 40px #00000066;
}
.card.kr-card::before{
  background:radial-gradient(circle at 50% 0%, rgba(0,255,136,0.06) 0%, transparent 70%);
}

.card-icon{
  font-size:3rem;
  line-height:1;
}

.card-title{
  font-size:1rem;
  letter-spacing:3px;
  color:#c0d8f0;
}

.card-sub{
  font-size:0.65rem;
  color:#334466;
  letter-spacing:2px;
  text-align:center;
  padding:0 16px;
  line-height:1.6;
}

.card-tag{
  position:absolute;
  top:12px;right:12px;
  font-size:0.58rem;
  letter-spacing:1px;
  padding:2px 8px;
  border-radius:4px;
  border:1px solid #1a4070;
  color:#335577;
}

.card.kr-card .card-tag{
  border-color:#1a4028;
  color:#2a5540;
}

.footer{
  position:fixed;
  bottom:20px;
  font-size:0.62rem;
  color:#1c2840;
  letter-spacing:2px;
}
</style>
</head>
<body>

<div class="logo">
  <h1>EXCELSIOR UAS</h1>
  <p>CHOOSE YOUR MISSION</p>
</div>

<div class="cards">

  <a class="card" href="game.html">
    <span class="card-tag">ARCADE</span>
    <div class="card-icon">🚁</div>
    <div class="card-title">DRONE RUNNER</div>
    <div class="card-sub">Cyberpunk FPV arcade · avoid buildings · beat the world record</div>
  </a>

  <a class="card kr-card" href="keyboard.html">
    <span class="card-tag">TOOL</span>
    <div class="card-icon">⌨</div>
    <div class="card-title">한글 KEYBOARD</div>
    <div class="card-sub">Korean keyboard with V · F consonants · ㅸ and ㆄ</div>
  </a>

</div>

<div class="footer">EXCELSIORUAS.COM</div>

</body>
</html>
